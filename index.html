<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>遇见你 - lzy ❤</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh; height:100dvh; overflow:hidden;
  font-family:'STKaiti','KaiTi','Microsoft YaHei',serif;
  background:radial-gradient(ellipse at 50% 30%, #2d1040 0%, #1a0828 50%, #0d0018 100%);
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

.particles { position:fixed; inset:0; z-index:1; pointer-events:none; }
.particle {
  position:absolute; pointer-events:none;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { transform:translateY(105vh) rotate(0deg) scale(0); opacity:0; }
  8% { opacity:0.7; } 90% { opacity:0.5; }
  100% { transform:translateY(-10vh) rotate(360deg) scale(1.2); opacity:0; }
}

.love-words-layer { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.love-word {
  position:absolute; white-space:nowrap;
  color:rgba(255,180,210,0.5);
  text-shadow:0 0 15px rgba(255,120,180,0.3);
  animation:loveWordFloat linear infinite;
  letter-spacing:2px;
}
@keyframes loveWordFloat {
  0% { transform:translateY(110vh) translateX(0); opacity:0; }
  5% { opacity:0.55; } 85% { opacity:0.45; }
  100% { transform:translateY(-10vh) translateX(30px); opacity:0; }
}

.hud {
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:max(12px, env(safe-area-inset-top)) 16px 12px;
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(180deg, rgba(10,0,20,0.95) 0%, transparent 100%);
  pointer-events:none;
}
.hud-left { display:flex; flex-direction:column; gap:2px; }
.hud-level-name { font-size:14px; color:#d48bff; text-shadow:0 0 8px rgba(200,100,255,0.4); }
.hud-level-title {
  font-size:20px; font-weight:bold;
  background:linear-gradient(135deg, #ff6b9d, #c44dff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hud-right { display:flex; align-items:center; gap:6px; color:#ffb8d0; font-size:16px; }
.hud-right .icon { font-size:22px; animation:heartBeat 1s ease-in-out infinite; }
@keyframes heartBeat {
  0%,100% { transform:scale(1); } 30% { transform:scale(1.35); }
}
.progress-wrap {
  position:fixed; top:calc(max(12px, env(safe-area-inset-top)) + 70px);
  left:50%; transform:translateX(-50%); z-index:20;
  width:min(240px, 60vw); height:5px;
  background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; pointer-events:none;
}
.progress-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg, #ff6b9d, #ff9a8b, #c44dff);
  transition:width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow:0 0 12px rgba(255,100,150,0.5);
}

.game-area { position:fixed; inset:0; z-index:10; cursor:pointer; }

.collectible {
  position:absolute; cursor:pointer; z-index:12;
  animation:itemFloat 3s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;
}
.collectible:active { transform:scale(0.85); }
.collectible.popped { animation:popBurst 0.5s ease-out forwards !important; pointer-events:none; }
@keyframes itemFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
@keyframes popBurst { 0% { transform:scale(1); opacity:1; } 100% { transform:scale(3); opacity:0; } }

.heart-item { font-size:36px; filter:drop-shadow(0 0 8px rgba(255,100,150,0.5)); }
.photo-bubble {
  width:85px; height:85px; border-radius:50%;
  border:3px solid rgba(255,160,200,0.75);
  object-fit:cover;
  box-shadow:0 0 20px rgba(255,100,180,0.4);
  background:rgba(255,100,180,0.08);
}
.photo-bubble.popped { animation:photoPop 0.6s ease-out forwards !important; }
@keyframes photoPop {
  0% { transform:scale(1); opacity:1; }
  60% { transform:scale(1.4); opacity:0.7; border-color:#ff6b9d; }
  100% { transform:scale(0); opacity:0; }
}

.score-pop {
  position:absolute; pointer-events:none; z-index:30;
  font-size:22px; font-weight:bold; color:#ff6b9d;
  animation:scoreUp 1s ease-out forwards;
  text-shadow:0 0 12px rgba(255,100,150,0.5);
}
@keyframes scoreUp { 0% { transform:translateY(0) scale(0.8); opacity:1; } 100% { transform:translateY(-70px) scale(1.4); opacity:0; } }

.overlay {
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:rgba(8,0,12,0.88); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  animation:fadeIn 0.6s ease; padding:20px;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.start-screen { text-align:center; color:#ffb8d0; }
.start-date-badge {
  display:inline-block; padding:6px 20px;
  border:1px solid rgba(255,150,200,0.3); border-radius:20px;
  font-size:13px; color:#d48bff; margin-bottom:20px; letter-spacing:1px;
}
.start-title {
  font-size:clamp(36px, 8vw, 56px); margin-bottom:6px;
  background:linear-gradient(135deg, #ff6b9d, #ff9a8b, #c44dff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; animation:titleGlow 2s ease-in-out infinite;
}
@keyframes titleGlow { 0%,100% { filter:brightness(1); } 50% { filter:brightness(1.4); } }
.start-subtitle { font-size:18px; color:#ff9ab0; margin-bottom:28px; }
.start-memories { font-size:13px; color:rgba(255,180,200,0.5); margin-bottom:36px; line-height:1.8; }
.btn {
  display:inline-block; padding:15px 52px; font-size:20px; font-family:inherit; letter-spacing:2px;
  color:#fff; border:none; border-radius:50px;
  background:linear-gradient(135deg, #ff6b9d, #c44dff);
  cursor:pointer; transition:all 0.3s ease;
  box-shadow:0 4px 30px rgba(255,100,150,0.4); -webkit-tap-highlight-color:transparent;
}
.btn:active { transform:scale(0.94); }

.lc-wrap { text-align:center; max-width:380px; width:100%; }
.lc-emoji { font-size:56px; margin-bottom:8px; }
.lc-title { font-size:clamp(28px, 6vw, 38px); color:#ff6b9d; margin-bottom:16px; text-shadow:0 0 20px rgba(255,100,150,0.4); }
.lc-msg {
  font-size:17px; color:#ffe0ea; line-height:2; margin-bottom:28px; padding:20px 16px;
  background:rgba(255,255,255,0.04); border-radius:16px; border:1px solid rgba(255,150,200,0.15);
}
.lc-msg .quote { font-size:13px; color:#b87bff; margin-top:10px; }

.final-wrap { text-align:center; max-width:460px; width:100%; }
.final-heart { font-size:72px; animation:finalBeat 1.5s ease-in-out infinite; }
@keyframes finalBeat { 0%,100%{transform:scale(1)} 20%{transform:scale(1.18)} 40%{transform:scale(0.93)} 60%{transform:scale(1.1)} }
.final-title {
  font-size:clamp(32px, 7vw, 46px); margin:12px 0;
  background:linear-gradient(135deg, #ff6b9d, #ff9a8b, #c44dff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.final-quote { font-size:17px; color:#ffe0ea; line-height:2.2; margin:16px 0; }
.final-big { font-size:clamp(26px, 6vw, 36px); color:#ff6b9d; margin-top:8px; text-shadow:0 0 30px rgba(255,100,150,0.5); line-height:1.6; }
.final-date { font-size:14px; color:#a87bff; margin-top:20px; }

.confetti-container { position:fixed; inset:0; z-index:60; pointer-events:none; }
.confetti { position:absolute; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0% { transform:translateY(-10vh) rotate(0deg); opacity:1; } 100% { transform:translateY(112vh) rotate(720deg); opacity:0; } }

@media (max-width:480px) {
  .heart-item { font-size:30px; }
  .photo-bubble { width:68px; height:68px; border-width:2px; }
  .love-word { font-size:14px; }
  .hud-level-title { font-size:17px; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="love-words-layer" id="loveWordsLayer"></div>

<div class="hud" id="hud" style="display:none">
  <div class="hud-left">
    <span class="hud-level-name" id="hudDate"></span>
    <span class="hud-level-title" id="hudLevel"></span>
  </div>
  <div class="hud-right"><span class="icon">❤️</span><span id="hudScore">0</span></div>
</div>
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="game-area" id="gameArea" style="display:none"></div>

<div class="overlay" id="startOverlay">
  <div class="start-screen">
    <div class="start-date-badge">💕 2026.3.22 — 2026.5.29</div>
    <div class="start-title">遇见你</div>
    <div class="start-subtitle">❤ 心跳回忆闯关 ❤</div>
    <div class="start-memories">点击照片气泡 +3分 💕<br>点击爱心信封 +1分 ❤️<br>重温属于我们的 68 天</div>
    <button class="btn" id="startBtn">💕 开始回忆</button>
  </div>
</div>

<script>
// ===== 78张照片 =====
const PHOTOS = [];
for (let i=1; i<=78; i++) {
  PHOTOS.push('photo_' + String(i).padStart(3,'0') + '.' + ([55,67].includes(i)?'png':'jpg'));
}
const PB = 'assets/photos/';
const onScreen = new Set();

// 洗牌池
let pool = [];
function refillPool() {
  pool = [...PHOTOS];
  for (let i=pool.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
}
refillPool();
function nextPhoto() {
  if (!pool.length) refillPool();
  // 尽力不重复
  for (let i=0; i<pool.length; i++) {
    const p = PB + pool[i];
    if (!onScreen.has(p)) { pool.splice(i,1); return p; }
  }
  return PB + pool.pop();
}

// ===== 情话 =====
const LOVE_WORDS = [
  '遇见你，是最大的幸运','有你的每天，都像春天','你就是我的整个宇宙',
  '想和你一起看日落','你的名字，我的心事','温柔是你，浪漫是你',
  '最好的时光，是和你在一起','喜欢你，不讲道理','心跳为你加速',
  '你的笑容，是我的全世界','陪你走遍天涯海角','你就是我的小确幸',
  '每一天，都比昨天更爱你','有你陪伴，人间值得','你是我的星辰大海',
  '想和你虚度时光','你一笑，世界就亮了','光阴的故事里，都是你',
  '把你放在心尖上','你是人间四月天','有你就很甜','一眼就是你',
  '爱是和你在一起','你让生活有了色彩','不小心就爱上了你',
  '和你在一起，就是最好的日子','世界上最美的三个字，是你的名字',
  '余生很长，想和你一起走','你是我的宝藏','想做你的太阳',
  '我的快乐，都是关于你','山河不及你','你是我的满心欢喜',
  '始于初见，止于终老','万物皆甜，而你胜过万物',
  '春风十里，不如你','你是最美的意外','有生之年，欣喜相逢',
  '希望余生，全都是你','你是我疲惫生活里的温柔梦想',
  '所爱隔山海，山海皆可平','你的眼睛里有星星',
  '愿得一人心，白首不相离','承蒙你出现，够我喜欢好多年',
];

function startLoveWords() {
  const layer = document.getElementById('loveWordsLayer');
  function spawn() {
    const el = document.createElement('span');
    el.className = 'love-word';
    el.textContent = LOVE_WORDS[Math.floor(Math.random()*LOVE_WORDS.length)];
    el.style.left = (2+Math.random()*80)+'%';
    el.style.fontSize = (13+Math.random()*12)+'px';
    el.style.animationDuration = (15+Math.random()*25)+'s';
    layer.appendChild(el);
    setTimeout(()=>el.remove(), 40000);
  }
  for (let i=0; i<10; i++) setTimeout(spawn, i*600);
  setInterval(spawn, 3000);
}

// ===== 粒子 =====
function setupParticles() {
  const c = document.getElementById('particles');
  const e = ['💕','✨','💗','🌟','💖','🫧','💝','🌸','💘','🦋','💓','💞'];
  for (let i=0; i<18; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = e[Math.floor(Math.random()*e.length)];
    p.style.left = Math.random()*100+'%';
    p.style.fontSize = (10+Math.random()*18)+'px';
    p.style.animationDuration = (10+Math.random()*22)+'s';
    p.style.animationDelay = Math.random()*18+'s';
    c.appendChild(p);
  }
}

// ===== 关卡数据 =====
const LEVELS = [
  { name:'初见', date:'2026.3.22', target:12,
    msg:'那一天，我们的故事开始了。\n世界很大，但偏偏让我遇见了你。\n你的名字，从此刻在了我心里。',
    quote:'——《初见》· 3月22日' },
  { name:'相知', date:'2026.4.5', target:18,
    msg:'每天醒来第一件事，就是看你的消息。\n你发的每一个字，每一张照片，\n都让平凡的日子开出花来。',
    quote:'——《相知》· 4月初' },
  { name:'心动', date:'2026.4.20', target:24,
    msg:'你的笑声，是世上最好听的声音。\n和你在一起的分分秒秒，\n都像电影里最美的画面。',
    quote:'——《心动》· 4月中' },
  { name:'甜蜜', date:'2026.5.5', target:30,
    msg:'有你的日子，每一天都是甜的。\n春天的风，夏天的雨，\n都不如你轻轻喊我的名字。',
    quote:'——《甜蜜》· 5月初' },
  { name:'永远', date:'2026.5.29', target:36,
    msg:'从3月22日到今天，68天。\n不长不短，却是我人生中最美的68天。\n未来每一天，都想和你一起走过。',
    quote:'——《永远》· 5月29日' }
];

const FINAL_WORDS = ['我想对你说的话，都藏在这 68 天里。','但最重要的——'];

let currentLevel=0, score=0, target=0, gameActive=false, spawnTimer=null;
const $=id=>document.getElementById(id);
const gameArea=$('gameArea'), startOverlay=$('startOverlay');

// ===== 生成收集物 =====
function spawnCollectible() {
  if (!gameActive) return;
  const isPhoto = Math.random() < 0.6; // 60%照片，40%爱心

  if (isPhoto) {
    const src = nextPhoto(); onScreen.add(src);
    const el = document.createElement('img');
    el.src = src;
    el.className = 'collectible photo-bubble';
    el.style.left = (3+Math.random()*82)+'%';
    el.style.top = (8+Math.random()*72)+'%';
    el.style.animationDuration = (3+Math.random()*3)+'s';
    const h = (e) => { e.stopPropagation(); e.preventDefault(); collectItem(el, src, true); };
    el.addEventListener('click', h);
    el.addEventListener('touchstart', h, {passive:false});
    gameArea.appendChild(el);
    setTimeout(() => {
      onScreen.delete(src);
      if (el.parentNode && !el.classList.contains('popped')) {
        el.style.opacity='0'; el.style.transition='opacity 0.5s';
        setTimeout(()=>el.remove(), 500);
      }
    }, 9000);
  } else {
    const hearts = ['❤️','💕','💗','💖','💝','💘','💓','💞','💌','💟','❣️','🌹','💐','🎀','🦋','✨'];
    const el = document.createElement('span');
    el.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    el.className = 'collectible heart-item';
    el.style.left = (3+Math.random()*85)+'%';
    el.style.top = (8+Math.random()*75)+'%';
    el.style.animationDuration = (2.5+Math.random()*3)+'s';
    el.style.animationDelay = Math.random()*1.5+'s';
    const h = (e) => { e.stopPropagation(); e.preventDefault(); collectItem(el, null, false); };
    el.addEventListener('click', h);
    el.addEventListener('touchstart', h, {passive:false});
    gameArea.appendChild(el);
    setTimeout(() => {
      if (el.parentNode && !el.classList.contains('popped')) {
        el.style.opacity='0'; el.style.transition='opacity 0.5s';
        setTimeout(()=>el.remove(), 500);
      }
    }, 6000+Math.random()*2000);
  }
}

function collectItem(el, src, isPhoto) {
  if (el.classList.contains('popped')) return;
  el.classList.add('popped');
  if (src) onScreen.delete(src);

  const pop = document.createElement('span');
  pop.className = 'score-pop';
  pop.textContent = isPhoto ? '+3 💕' : '+1 ❤️';
  pop.style.left = el.style.left; pop.style.top = el.style.top;
  gameArea.appendChild(pop);
  setTimeout(()=>pop.remove(), 1000);

  score += isPhoto ? 3 : 1;
  updateHUD();
  spawnBurst(el);
  setTimeout(()=>el.remove(), 500);
  if (score >= target) levelComplete();
}

function spawnBurst(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left+r.width/2, cy = r.top+r.height/2;
  for (let i=0; i<6; i++) {
    const p = document.createElement('span');
    p.textContent = ['✨','💕','🌟','💗','🌸'][i%5];
    p.style.cssText = `position:fixed;z-index:40;pointer-events:none;left:${cx}px;top:${cy}px;font-size:14px;transition:all 0.9s cubic-bezier(0,0.7,0.3,1);opacity:1;`;
    document.body.appendChild(p);
    requestAnimationFrame(()=>{ p.style.transform=`translate(${(Math.random()-0.5)*100}px,${(Math.random()-0.5)*100}px) scale(0)`; p.style.opacity='0'; });
    setTimeout(()=>p.remove(), 1000);
  }
}

function updateHUD() {
  $('hudScore').textContent = score;
  $('progressFill').style.width = Math.min(100,(score/target)*100)+'%';
}

// ===== 撒花 =====
function spawnConfetti(n=50) {
  const c = document.createElement('div'); c.className = 'confetti-container';
  document.body.appendChild(c);
  const items = ['❤️','💕','💗','✨','🌟','💖','🌸','🎀','💝','💘'];
  for (let i=0; i<n; i++) {
    const el = document.createElement('span'); el.className = 'confetti';
    el.textContent = items[Math.floor(Math.random()*items.length)];
    el.style.left = Math.random()*100+'%';
    el.style.top = -(Math.random()*15)+'vh';
    el.style.fontSize = (14+Math.random()*22)+'px';
    el.style.animationDuration = (2+Math.random()*4)+'s';
    el.style.animationDelay = Math.random()*2+'s';
    c.appendChild(el);
  }
  setTimeout(()=>c.remove(), 7000);
}

// ===== 关卡完成 =====
function levelComplete() {
  gameActive=false; clearInterval(spawnTimer); spawnConfetti(60);
  const lv = LEVELS[currentLevel];
  const overlay = document.createElement('div'); overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="lc-wrap">
      <div class="lc-emoji">${['🌸','💗','💖','💝','💘'][currentLevel]}</div>
      <div class="lc-title">${lv.name} · 完成！</div>
      <div class="lc-msg">${lv.msg.replace(/\n/g,'<br>')}<div class="quote">${lv.quote}</div></div>
      <button class="btn" id="nextBtn">${currentLevel<LEVELS.length-1?'💕 下一关':'💖 揭晓'}</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#nextBtn').addEventListener('click', ()=>{
    overlay.remove();
    document.querySelectorAll('.confetti-container').forEach(c=>c.remove());
    if (currentLevel<LEVELS.length-1) { currentLevel++; startLevel(); }
    else showFinal();
  });
}

// ===== 最终 =====
function showFinal() {
  gameActive=false;
  gameArea.style.display='none'; $('hud').style.display='none'; $('progressWrap').style.display='none';
  for (let i=0; i<3; i++) setTimeout(()=>spawnConfetti(70), i*1200);
  const overlay = document.createElement('div'); overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="final-wrap">
      <div class="final-heart">💖</div>
      <div class="final-title">我们的故事</div>
      <div class="final-quote">${FINAL_WORDS.join('<br>')}</div>
      <div class="final-big">我爱你，lzy<br>一直在一起 💕</div>
      <div class="final-date">2026.3.22 — 2026.5.29 · 未完待续</div>
      <button class="btn" style="margin-top:20px" onclick="location.reload()">🔄 再玩一次</button>
    </div>`;
  document.body.appendChild(overlay);
  let cc=0; const iv=setInterval(()=>{ spawnConfetti(50); if(++cc>6) clearInterval(iv); }, 2200);
}

// ===== 开始 =====
function startLevel() {
  const lv = LEVELS[currentLevel];
  score=0; target=lv.target; gameActive=true;
  onScreen.clear();
  $('hudDate').textContent = lv.date;
  $('hudLevel').textContent = '第'+(currentLevel+1)+'关 · '+lv.name;
  $('hudScore').textContent = '0'; $('progressFill').style.width = '0%';
  gameArea.style.display='block'; $('hud').style.display='flex'; $('progressWrap').style.display='block';
  gameArea.innerHTML='';

  const maxOnScreen = 6 + currentLevel;
  spawnTimer = setInterval(() => {
    const n = gameArea.querySelectorAll('.collectible:not(.popped)').length;
    for (let i=n; i<maxOnScreen; i++) spawnCollectible();
  }, 900);

  for (let i=0; i<5; i++) setTimeout(()=>spawnCollectible(), i*250);
}

function startGame() { startOverlay.style.display='none'; currentLevel=0; startLevel(); }

gameArea.addEventListener('click', (e)=>{
  if (!gameActive || e.target!==gameArea) return;
  const h=document.createElement('span');
  h.textContent='💕';
  h.style.cssText = `position:fixed;z-index:30;pointer-events:none;left:${e.clientX-10}px;top:${e.clientY-10}px;font-size:22px;animation:scoreUp 1.5s ease-out forwards;`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 1600);
});

$('startBtn').addEventListener('click', startGame);
$('startBtn').addEventListener('touchend', (e)=>{ e.preventDefault(); startGame(); });

setupParticles();
startLoveWords();
</script>
</body>
</html>
